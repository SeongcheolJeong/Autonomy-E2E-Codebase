              python3 30_Projects/P_E2E_Stack/prototype/compare_runtime_evidence.py \
                --left "$runtime_compare_awsim_path" \
                --right "$runtime_compare_carla_path" \
                --left-label awsim \
                --right-label carla \
                --out-json "$runtime_evidence_compare_json_path" \
                --out-text "$runtime_evidence_compare_text_path"
              runtime_evidence_compare_summary="$(python3 - "$runtime_evidence_compare_json_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          summary = "n/a"
          try:
              payload = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              payload = {}

          if isinstance(payload, dict):
              diff = payload.get("diff")
              if isinstance(diff, dict):
                  top_level_mismatches = diff.get("top_level_mismatches", {})
                  status_count_diffs = diff.get("status_count_diffs", {})
                  runtime_count_diffs = diff.get("runtime_count_diffs", {})
                  profile_diffs = diff.get("profile_diffs", [])
                  summary = (
                      "top_level_mismatches:{top},status_count_diffs:{status},"
                      "runtime_count_diffs:{runtime},profile_diffs:{profiles}"
                  ).format(
                      top=len(top_level_mismatches) if isinstance(top_level_mismatches, dict) else 0,
                      status=len(status_count_diffs) if isinstance(status_count_diffs, dict) else 0,
                      runtime=len(runtime_count_diffs) if isinstance(runtime_count_diffs, dict) else 0,
                      profiles=len(profile_diffs) if isinstance(profile_diffs, list) else 0,
                  )

          print(summary)
          PY
              )"
            else
              runtime_evidence_compare_summary="skipped:missing_runtime_evidence_paths"
            fi
          else
            runtime_evidence_compare_summary="skipped:single_runtime"
          fi
          echo "runtime_evidence_compare_json_path=$runtime_evidence_compare_json_path" >> "$GITHUB_OUTPUT"
          echo "runtime_evidence_compare_text_path=$runtime_evidence_compare_text_path" >> "$GITHUB_OUTPUT"
          echo "runtime_evidence_compare_summary=$runtime_evidence_compare_summary" >> "$GITHUB_OUTPUT"
          echo "resolved_lane=$resolved_lane" >> "$GITHUB_OUTPUT"
          echo "runner_platform=${host_os}/${host_arch}" >> "$GITHUB_OUTPUT"
          if [ "$runtime_failures" -gt 0 ]; then
            exit 2
          fi

      - name: Publish runtime lane summary
        id: publish_runtime_lane_summary
        if: ${{ always() }}
        shell: bash
        env:
          RUNTIME_RELEASE_ID: ${{ steps.run_lane.outputs.release_id }}
