              "phase2_sensor_radar_false_positive_rate_avg_hold_max_input_effective_mismatch"
          fi

          if [ -n "$runtime_threshold_drift_summary" ]; then
            runtime_threshold_drift_detected="1"
            if [ "$runtime_threshold_drift_hold_detected" = "1" ]; then
              runtime_threshold_drift_severity="HOLD"
            else
              runtime_threshold_drift_severity="WARN"
            fi
            if [ "$runtime_threshold_drift_fail_on_hold_input" = "1" ] && [ "$runtime_threshold_drift_severity" = "HOLD" ]; then
              runtime_threshold_drift_fail_gate="1"
            fi
            python3 30_Projects/P_E2E_Stack/prototype/write_ci_summary_section.py \
              --title "Runtime Available Threshold Drift" \
              --item "warning=detected" \
              --item "detected=${runtime_threshold_drift_detected}" \
              --item "severity=${runtime_threshold_drift_severity}" \
              --item "summary=${runtime_threshold_drift_summary}" \
              --item "reasons=${runtime_threshold_drift_reasons}"
          fi

          echo "runtime_threshold_drift_detected=$runtime_threshold_drift_detected" >> "$GITHUB_OUTPUT"
          echo "runtime_threshold_drift_severity=$runtime_threshold_drift_severity" >> "$GITHUB_OUTPUT"
          echo "runtime_threshold_drift_summary=$runtime_threshold_drift_summary" >> "$GITHUB_OUTPUT"
          echo "runtime_threshold_drift_hold_detected=$runtime_threshold_drift_hold_detected" >> "$GITHUB_OUTPUT"
