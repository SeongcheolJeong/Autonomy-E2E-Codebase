          NOTIFY_FAIL_ON_RUNTIME_NATIVE_EVIDENCE_COMPARE_THRESHOLD_HOLD: ${{ github.event.inputs.runtime_native_evidence_compare_threshold_fail_on_hold }}
          NOTIFY_PHASE3_VEHICLE_CONTROL_OVERLAP_RATIO_WARN_MAX: ${{ github.event.inputs.notify_phase3_vehicle_control_overlap_ratio_warn_max }}
