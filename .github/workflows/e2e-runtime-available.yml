            append_runtime_threshold_drift \
              "phase2_sensor_lidar_point_count_avg_hold_min input=${RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN_INPUT} effective=${RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN}" \
