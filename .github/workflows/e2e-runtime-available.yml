        run: |
          set -euo pipefail
          bash 30_Projects/P_E2E_Stack/prototype/run_ci_summary_entry.sh

      - name: Upload runtime artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runtime-available-${{ steps.run_lane.outputs.release_id }}
          if-no-files-found: warn
          path: |
            e2e_pipeline.log
            runtime_available_release_diff.txt
            runtime_available_release_summary.json
            runtime_available_release_summary.sqlite
            runtime_available_notification_payload.json
            30_Projects/P_Cloud-Engine/prototype/batch_runs
            30_Projects/P_Sim-Engine/prototype/runs
            30_Projects/P_Validation-Tooling-MVP/prototype/reports

  runtime-native-docker-auto-smoke:
    if: ${{ github.event.inputs.runtime_native_docker_auto_enable != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      release_id: ${{ steps.run_runtime_native.outputs.release_id }}
      target: ${{ steps.run_runtime_native.outputs.target }}
      dry_run: ${{ steps.run_runtime_native.outputs.dry_run }}
      sim_runtime: ${{ steps.run_runtime_native.outputs.sim_runtime }}
      manifest_path: ${{ steps.run_runtime_native.outputs.manifest_path }}
      manifest_paths: ${{ steps.run_runtime_native.outputs.manifest_paths }}
      manifest_rows_total: ${{ steps.run_runtime_native.outputs.manifest_rows_total }}
      manifest_pass_count: ${{ steps.run_runtime_native.outputs.manifest_pass_count }}
      manifest_partial_count: ${{ steps.run_runtime_native.outputs.manifest_partial_count }}
      manifest_fail_count: ${{ steps.run_runtime_native.outputs.manifest_fail_count }}
      manifest_missing_count: ${{ steps.run_runtime_native.outputs.manifest_missing_count }}
      manifest_runtime_results: ${{ steps.run_runtime_native.outputs.manifest_runtime_results }}
      manifest_missing_runtimes: ${{ steps.run_runtime_native.outputs.manifest_missing_runtimes }}
      manifest_overall_result: ${{ steps.run_runtime_native.outputs.manifest_overall_result }}
      summary_compare_path: ${{ steps.run_runtime_native.outputs.summary_compare_path }}
      summary_compare_artifact_count: ${{ steps.run_runtime_native.outputs.summary_compare_artifact_count }}
      summary_compare_with_diffs: ${{ steps.run_runtime_native.outputs.summary_compare_with_diffs }}
      summary_compare_without_diffs: ${{ steps.run_runtime_native.outputs.summary_compare_without_diffs }}
      summary_compare_status: ${{ steps.run_runtime_native.outputs.summary_compare_status }}
      summary_compare_issue: ${{ steps.run_runtime_native.outputs.summary_compare_issue }}
      summary_compare_enforcement_failed: ${{ steps.run_runtime_native.outputs.summary_compare_enforcement_failed }}
      evidence_compare_path: ${{ steps.run_runtime_native.outputs.evidence_compare_path }}
      evidence_compare_text_path: ${{ steps.run_runtime_native.outputs.evidence_compare_text_path }}
      evidence_compare_summary: ${{ steps.run_runtime_native.outputs.evidence_compare_summary }}
      runtime_interop_contract_xosc: ${{ steps.run_runtime_native.outputs.runtime_interop_contract_xosc }}
      runtime_interop_contract_xodr: ${{ steps.run_runtime_native.outputs.runtime_interop_contract_xodr }}
      runtime_interop_import_manifest_consistency_mode: ${{ steps.run_runtime_native.outputs.runtime_interop_import_manifest_consistency_mode }}
      runtime_interop_import_export_consistency_mode: ${{ steps.run_runtime_native.outputs.runtime_interop_import_export_consistency_mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run runtime-native docker auto smoke
        id: run_runtime_native
        shell: bash
        env:
          INPUT_RELEASE_ID: ${{ github.event.inputs.release_id }}
          INPUT_DRY_RUN: ${{ github.event.inputs.runtime_native_docker_auto_dry_run }}
          INPUT_SIM_RUNTIME: ${{ github.event.inputs.runtime_native_sim_runtime }}
          INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_MISSING: ${{ github.event.inputs.runtime_native_summary_compare_fail_on_missing }}
          INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_DIFFS: ${{ github.event.inputs.runtime_native_summary_compare_fail_on_diffs }}
          INPUT_RUNTIME_SCENARIO_CONTRACT_ENABLE: ${{ github.event.inputs.runtime_scenario_contract_enable }}
          INPUT_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_scenario_contract_require_runtime_ready }}
          INPUT_RUNTIME_SCENE_RESULT_ENABLE: ${{ github.event.inputs.runtime_scene_result_enable }}
          INPUT_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_scene_result_require_runtime_ready }}
          INPUT_RUNTIME_INTEROP_CONTRACT_ENABLE: ${{ github.event.inputs.runtime_interop_contract_enable }}
          INPUT_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_interop_contract_require_runtime_ready }}
          INPUT_RUNTIME_INTEROP_EXPORT_ROAD_LENGTH_SCALE: ${{ github.event.inputs.runtime_interop_export_road_length_scale }}
          INPUT_RUNTIME_INTEROP_CONTRACT_XOSC: ${{ github.event.inputs.runtime_interop_contract_xosc }}
          INPUT_RUNTIME_INTEROP_CONTRACT_XODR: ${{ github.event.inputs.runtime_interop_contract_xodr }}
          INPUT_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE: ${{ github.event.inputs.runtime_interop_import_manifest_consistency_mode }}
          INPUT_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE: ${{ github.event.inputs.runtime_interop_import_export_consistency_mode }}
          FALLBACK_RUN_ID: ${{ github.run_id }}
          FALLBACK_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          case "$INPUT_DRY_RUN" in
            0|1) ;;
            *)
              echo "[error] runtime_native_docker_auto_dry_run must be 0 or 1, got: $INPUT_DRY_RUN" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_MISSING" in
            0|1) ;;
            *)
              echo "[error] runtime_native_summary_compare_fail_on_missing must be 0 or 1, got: $INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_MISSING" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_DIFFS" in
            0|1) ;;
            *)
              echo "[error] runtime_native_summary_compare_fail_on_diffs must be 0 or 1, got: $INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_DIFFS" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY" in
            0|1) ;;
            *)
              echo "[error] runtime_scenario_contract_require_runtime_ready must be 0 or 1, got: $INPUT_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY" in
            0|1) ;;
            *)
              echo "[error] runtime_scene_result_require_runtime_ready must be 0 or 1, got: $INPUT_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY" in
            0|1) ;;
            *)
              echo "[error] runtime_interop_contract_require_runtime_ready must be 0 or 1, got: $INPUT_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE" in
            require|allow) ;;
            *)
              echo "[error] runtime_interop_import_manifest_consistency_mode must be one of: require, allow; got: $INPUT_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE" >&2
              exit 2
              ;;
          esac
          case "$INPUT_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE" in
            require|allow) ;;
            *)
              echo "[error] runtime_interop_import_export_consistency_mode must be one of: require, allow; got: $INPUT_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE" >&2
              exit 2
              ;;
          esac

          case "$INPUT_SIM_RUNTIME" in
            awsim|carla|both) ;;
            *)
              echo "[error] runtime_native_sim_runtime must be one of: awsim, carla, both; got: $INPUT_SIM_RUNTIME" >&2
              exit 2
              ;;
          esac

          runtime_release_id="$INPUT_RELEASE_ID"
          if [ -z "$runtime_release_id" ]; then
            runtime_release_id="REL_RUNTIME_NATIVE_DOCKER_AUTO_${FALLBACK_RUN_ID}_${FALLBACK_RUN_ATTEMPT}"
          else
            runtime_release_id="${runtime_release_id}_RNATIVE"
          fi

          runtime_interop_export_road_length_scale="$INPUT_RUNTIME_INTEROP_EXPORT_ROAD_LENGTH_SCALE"
          if [ -z "$runtime_interop_export_road_length_scale" ]; then
            runtime_interop_export_road_length_scale="1.0"
          fi
          workspace_root="$(pwd -P)"
          runtime_interop_contract_xosc="$INPUT_RUNTIME_INTEROP_CONTRACT_XOSC"
          if [ -z "$runtime_interop_contract_xosc" ]; then
            runtime_interop_contract_xosc="${workspace_root}/30_Projects/P_Sim-Engine/prototype/examples/openscenario_minimal_v0.xosc"
          elif [ "${runtime_interop_contract_xosc#/}" = "$runtime_interop_contract_xosc" ]; then
            runtime_interop_contract_xosc="${workspace_root}/${runtime_interop_contract_xosc}"
          fi
          runtime_interop_contract_xodr="$INPUT_RUNTIME_INTEROP_CONTRACT_XODR"
          if [ -z "$runtime_interop_contract_xodr" ]; then
            runtime_interop_contract_xodr="${workspace_root}/30_Projects/P_Sim-Engine/prototype/examples/opendrive_minimal_v0.xodr"
          elif [ "${runtime_interop_contract_xodr#/}" = "$runtime_interop_contract_xodr" ]; then
            runtime_interop_contract_xodr="${workspace_root}/${runtime_interop_contract_xodr}"
          fi
          runtime_interop_import_manifest_consistency_mode="$INPUT_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE"
          if [ -z "$runtime_interop_import_manifest_consistency_mode" ]; then
            runtime_interop_import_manifest_consistency_mode="allow"
          fi
          runtime_interop_import_export_consistency_mode="$INPUT_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE"
          if [ -z "$runtime_interop_import_export_consistency_mode" ]; then
            runtime_interop_import_export_consistency_mode="allow"
          fi

          target="pipeline-runtime-native-entry-smoke-docker-linux-auto"
          if [ "$INPUT_SIM_RUNTIME" = "both" ]; then
            target="pipeline-runtime-native-entry-smoke-auto-both-compare-summary"
          fi
          if [ "$INPUT_DRY_RUN" = "1" ]; then
            if [ "$INPUT_SIM_RUNTIME" = "both" ]; then
              target="pipeline-runtime-native-entry-smoke-auto-both-compare-summary-dry-run"
            else
              target="pipeline-runtime-native-entry-smoke-docker-linux-auto-dry-run"
            fi
          fi

          echo "release_id=$runtime_release_id" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "dry_run=$INPUT_DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "sim_runtime=$INPUT_SIM_RUNTIME" >> "$GITHUB_OUTPUT"
          echo "runtime_interop_contract_xosc=$runtime_interop_contract_xosc" >> "$GITHUB_OUTPUT"
          echo "runtime_interop_contract_xodr=$runtime_interop_contract_xodr" >> "$GITHUB_OUTPUT"
          echo "runtime_interop_import_manifest_consistency_mode=$runtime_interop_import_manifest_consistency_mode" >> "$GITHUB_OUTPUT"
          echo "runtime_interop_import_export_consistency_mode=$runtime_interop_import_export_consistency_mode" >> "$GITHUB_OUTPUT"
          echo "[info] runtime-native docker auto target=${target} sim_runtime=${INPUT_SIM_RUNTIME} release_id=${runtime_release_id}"

          make -C 30_Projects/P_E2E_Stack/prototype "$target" \
            RELEASE_ID="$runtime_release_id" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME="$INPUT_SIM_RUNTIME" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_PROBE_ENABLE="1" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_PROBE_EXECUTE="0" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_PROBE_REQUIRE_AVAILABILITY="0" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_SCENARIO_CONTRACT_ENABLE="$INPUT_RUNTIME_SCENARIO_CONTRACT_ENABLE" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY="$INPUT_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_SCENE_RESULT_ENABLE="$INPUT_RUNTIME_SCENE_RESULT_ENABLE" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY="$INPUT_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_CONTRACT_ENABLE="$INPUT_RUNTIME_INTEROP_CONTRACT_ENABLE" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY="$INPUT_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_EXPORT_ROAD_LENGTH_SCALE="$runtime_interop_export_road_length_scale" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_CONTRACT_XOSC="$runtime_interop_contract_xosc" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_CONTRACT_XODR="$runtime_interop_contract_xodr" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE="$runtime_interop_import_manifest_consistency_mode" \
            RUNTIME_NATIVE_ENTRY_SIM_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE="$runtime_interop_import_export_consistency_mode" \
            RUNTIME_NATIVE_ENTRY_AUTO_FORCE_LANE="docker" \
            RUNTIME_NATIVE_ENTRY_PHASE4_ENABLE_HOOKS="0" \
            RUNTIME_NATIVE_ENTRY_PHASE4_REQUIRE_DONE="0"

          manifest_path=""
          manifest_paths=""
          manifest_rows_total="0"
          manifest_pass_count="0"
          manifest_partial_count="0"
          manifest_fail_count="0"
          manifest_missing_count="0"
          manifest_runtime_results=""
          manifest_missing_runtimes=""
          manifest_overall_result="n/a"
          summary_compare_path=""
          summary_compare_artifact_count="0"
          summary_compare_with_diffs="0"
          summary_compare_without_diffs="0"
          summary_compare_status="n/a"
          summary_compare_issue="not_applicable_single_runtime"
          summary_compare_enforcement_failed="0"
          evidence_compare_path=""
          evidence_compare_text_path=""
          evidence_compare_summary="not_applicable_single_runtime"
          if [ "$INPUT_SIM_RUNTIME" = "both" ]; then
            summary_compare_status="pending"
            summary_compare_issue="awaiting_compare_evaluation"
            evidence_compare_summary="pending"
          fi
          if [ "$INPUT_DRY_RUN" != "1" ]; then
            if [ "$INPUT_SIM_RUNTIME" = "both" ]; then
              both_manifest_metrics="$(python3 - "$runtime_release_id" <<'PY'
          import json
          import sys
          from pathlib import Path

          base_release_id = str(sys.argv[1]).strip()
          root = Path("30_Projects/P_Cloud-Engine/prototype/batch_runs")
          targets = [f"{base_release_id}_awsim", f"{base_release_id}_carla"]
          selected_paths = {target: "" for target in targets}
          latest_mtimes = {target: -1.0 for target in targets}
          if root.exists():
              for path in root.rglob("pipeline_result.json"):
                  try:
                      payload = json.loads(path.read_text(encoding="utf-8"))
                  except Exception:
                      continue
                  release_id = str(payload.get("release_id", "")).strip()
                  if release_id not in selected_paths:
                      continue
                  try:
                      mtime = path.stat().st_mtime
                  except OSError:
                      mtime = -1.0
                  if mtime >= latest_mtimes[release_id]:
                      latest_mtimes[release_id] = mtime
                      selected_paths[release_id] = str(path.resolve())

          found_paths = []
          pass_count = 0
          partial_count = 0
          fail_count = 0
          missing_count = 0
          runtime_result_tokens = []
          missing_runtime_tokens = []
          for target in targets:
              runtime_name = target.rsplit("_", 1)[-1]
              manifest_path = selected_paths.get(target, "")
              if not manifest_path:
                  missing_count += 1
                  runtime_result_tokens.append(f"{runtime_name}:missing")
                  missing_runtime_tokens.append(runtime_name)
                  continue
              found_paths.append(manifest_path)
              overall_result = "n/a"
              try:
                  payload = json.loads(Path(manifest_path).read_text(encoding="utf-8"))
              except Exception:
                  payload = {}
              if isinstance(payload, dict):
                  raw = payload.get("overall_result")
                  if isinstance(raw, str) and raw.strip():
                      overall_result = raw.strip().lower()
              if overall_result == "pass":
                  pass_count += 1
              elif overall_result == "fail":
                  fail_count += 1
              elif overall_result in {"partial", "warn", "hold"}:
                  overall_result = "partial"
                  partial_count += 1
              else:
                  overall_result = "partial"
                  partial_count += 1
              runtime_result_tokens.append(f"{runtime_name}:{overall_result}")

          found_count = len(found_paths)
          if fail_count > 0:
              overall = "fail"
          elif partial_count > 0:
              overall = "partial"
          elif pass_count == len(targets):
              overall = "pass"
          else:
              overall = "n/a"

          first_path = found_paths[0] if found_paths else ""
          joined_paths = "|".join(found_paths)
          runtime_results_text = "|".join(runtime_result_tokens)
          missing_runtimes_text = ",".join(missing_runtime_tokens)
          print(f"manifest_path={first_path}")
          print(f"manifest_paths={joined_paths}")
          print(f"manifest_rows_total={found_count}")
          print(f"manifest_pass_count={pass_count}")
          print(f"manifest_partial_count={partial_count}")
          print(f"manifest_fail_count={fail_count}")
          print(f"manifest_missing_count={missing_count}")
          print(f"manifest_runtime_results={runtime_results_text}")
          print(f"manifest_missing_runtimes={missing_runtimes_text}")
          print(f"manifest_overall_result={overall}")
          PY
          )"
              while IFS='=' read -r key value; do
                case "$key" in
                  manifest_path) manifest_path="$value" ;;
                  manifest_paths) manifest_paths="$value" ;;
                  manifest_rows_total) manifest_rows_total="$value" ;;
                  manifest_pass_count) manifest_pass_count="$value" ;;
                  manifest_partial_count) manifest_partial_count="$value" ;;
                  manifest_fail_count) manifest_fail_count="$value" ;;
                  manifest_missing_count) manifest_missing_count="$value" ;;
                  manifest_runtime_results) manifest_runtime_results="$value" ;;
                  manifest_missing_runtimes) manifest_missing_runtimes="$value" ;;
                  manifest_overall_result) manifest_overall_result="$value" ;;
                esac
              done <<EOF
          $both_manifest_metrics
          EOF
            else
              manifest_path="$(python3 - "$runtime_release_id" <<'PY'
          import json
          import sys
          from pathlib import Path

          target_release_id = str(sys.argv[1]).strip()
          root = Path("30_Projects/P_Cloud-Engine/prototype/batch_runs")
          selected = ""
          latest_mtime = -1.0
          if root.exists():
              for path in root.rglob("pipeline_result.json"):
                  try:
                      payload = json.loads(path.read_text(encoding="utf-8"))
                  except Exception:
                      continue
                  release_id = str(payload.get("release_id", "")).strip()
                  if release_id != target_release_id:
                      continue
                  try:
                      mtime = path.stat().st_mtime
                  except OSError:
                      mtime = -1.0
                  if mtime >= latest_mtime:
                      latest_mtime = mtime
                      selected = str(path.resolve())
          print(selected)
          PY
          )"
              if [ -n "$manifest_path" ] && [ -f "$manifest_path" ]; then
                manifest_overall_result="$(python3 - "$manifest_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          value = "n/a"
          try:
              payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          if isinstance(payload, dict):
              raw = payload.get("overall_result")
              if isinstance(raw, str) and raw.strip():
                  value = raw.strip()
          print(value)
          PY
          )"
                manifest_paths="$manifest_path"
                manifest_rows_total="1"
                case "$manifest_overall_result" in
                  pass) manifest_pass_count="1" ;;
                  partial|warn|hold) manifest_partial_count="1" ;;
                  fail) manifest_fail_count="1" ;;
                  *) manifest_partial_count="1" ;;
                esac
                manifest_runtime_results="${INPUT_SIM_RUNTIME}:${manifest_overall_result}"
              else
                manifest_missing_count="1"
                manifest_runtime_results="${INPUT_SIM_RUNTIME}:missing"
                manifest_missing_runtimes="${INPUT_SIM_RUNTIME}"
              fi
            fi
            if [ "$INPUT_SIM_RUNTIME" = "both" ]; then
              summary_compare_status="missing"
              summary_compare_issue="summary_compare_file_missing"
              candidate_summary_compare_path="30_Projects/P_Validation-Tooling-MVP/prototype/reports/${runtime_release_id}_runtime_native_both_compare_e2e.summary.json"
              summary_compare_eval_json="$(mktemp)"
              summary_compare_eval_issue_sentinel="__EMPTY__"
              if [ -f "$candidate_summary_compare_path" ]; then
                summary_compare_path="$candidate_summary_compare_path"
              fi
              summary_compare_eval_rc=0
              python3 30_Projects/P_E2E_Stack/prototype/check_runtime_native_summary_compare_strict.py \
                --summary-json "$candidate_summary_compare_path" \
                --fail-on-missing "$INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_MISSING" \
                --fail-on-diffs "$INPUT_RUNTIME_NATIVE_SUMMARY_COMPARE_FAIL_ON_DIFFS" \
                --out-json "$summary_compare_eval_json" \
                || summary_compare_eval_rc=$?
              summary_compare_eval_values="$(python3 - "$summary_compare_eval_json" "$summary_compare_eval_issue_sentinel" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = {}
          issue_sentinel = str(sys.argv[2]).strip() or "__EMPTY__"
          try:
              payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          if not isinstance(payload, dict):
              payload = {}

          def as_int(name: str, default: int) -> int:
              try:
                  return int(payload.get(name, default))
              except Exception:
                  return default

          def as_text(name: str, default: str) -> str:
              raw = payload.get(name, default)
              token = str(raw).strip()
              if token:
                  return token
              return default

          artifact_count = str(as_int("artifact_count", 0))
          with_diffs = str(as_int("with_diffs", 0))
          without_diffs = str(as_int("without_diffs", 0))
          status = as_text("status", "invalid")
          issue = str(payload.get("issue", "")).strip()
          if not issue:
              issue = issue_sentinel
          enforcement_failed = str(1 if as_int("enforcement_failed", 0) > 0 else 0)
          print("\t".join((artifact_count, with_diffs, without_diffs, status, issue, enforcement_failed)))
          PY
          )"
              if [ -n "$summary_compare_eval_values" ]; then
                summary_compare_artifact_count="${summary_compare_eval_values%%$'\t'*}"
                summary_compare_eval_values_remainder="${summary_compare_eval_values#*$'\t'}"
                summary_compare_with_diffs="${summary_compare_eval_values_remainder%%$'\t'*}"
                summary_compare_eval_values_remainder="${summary_compare_eval_values_remainder#*$'\t'}"
                summary_compare_without_diffs="${summary_compare_eval_values_remainder%%$'\t'*}"
                summary_compare_eval_values_remainder="${summary_compare_eval_values_remainder#*$'\t'}"
                summary_compare_status="${summary_compare_eval_values_remainder%%$'\t'*}"
                summary_compare_eval_values_remainder="${summary_compare_eval_values_remainder#*$'\t'}"
                summary_compare_issue="${summary_compare_eval_values_remainder%%$'\t'*}"
                summary_compare_enforcement_failed="${summary_compare_eval_values_remainder#*$'\t'}"
              fi
              if [ "$summary_compare_issue" = "$summary_compare_eval_issue_sentinel" ]; then
                summary_compare_issue=""
              fi
              if [ "$summary_compare_eval_rc" -ne 0 ] && [ "$summary_compare_enforcement_failed" != "1" ]; then
                summary_compare_enforcement_failed="1"
                  if [ -z "$summary_compare_issue" ]; then
                    summary_compare_issue="summary_compare_policy_check_failed"
                  fi
                  echo "[error] runtime-native summary-compare policy check execution failed: rc=${summary_compare_eval_rc}" >&2
                fi
                candidate_evidence_compare_path="30_Projects/P_Validation-Tooling-MVP/prototype/reports/${runtime_release_id}_runtime_native_both_evidence_compare.json"
                candidate_evidence_compare_text_path="30_Projects/P_Validation-Tooling-MVP/prototype/reports/${runtime_release_id}_runtime_native_both_evidence_compare.txt"
                if [ -f "$candidate_evidence_compare_path" ]; then
                  evidence_compare_path="$candidate_evidence_compare_path"
                  if [ -f "$candidate_evidence_compare_text_path" ]; then
                    evidence_compare_text_path="$candidate_evidence_compare_text_path"
                  fi
                  evidence_compare_summary="$(python3 - "$candidate_evidence_compare_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          summary = "invalid:unreadable_json"
          try:
              payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          if isinstance(payload, dict):
              diff = payload.get("diff")
              if isinstance(diff, dict):
                  def count_dict(name: str) -> int:
                      value = diff.get(name, {})
                      return len(value) if isinstance(value, dict) else 0

                  def count_list(name: str) -> int:
                      value = diff.get(name, [])
                      return len(value) if isinstance(value, list) else 0

                  interop_mode_diffs = (
                      count_dict("interop_import_manifest_mode_count_diffs")
                      + count_dict("interop_import_export_mode_count_diffs")
                      + count_dict("interop_import_require_manifest_input_count_diffs")
                      + count_dict("interop_import_require_export_input_count_diffs")
                  )
                  summary = (
                      "top_level_mismatches:{top},status_count_diffs:{status},runtime_count_diffs:{runtime},"
                      "interop_import_mode_diffs:{interop_mode},profile_diffs:{profiles},"
