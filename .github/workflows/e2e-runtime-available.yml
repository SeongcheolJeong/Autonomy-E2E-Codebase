          if [ -n "$RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN_INPUT" ] && [ -n "$RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN" ] && [ "$RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN_INPUT" != "$RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN" ]; then
            append_runtime_threshold_drift \
              "phase2_sensor_lidar_point_count_avg_warn_min input=${RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN_INPUT} effective=${RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN}" \
              "phase2_sensor_lidar_point_count_avg_warn_min_input_effective_mismatch"
          fi
          if [ -n "$RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN_INPUT" ] && [ -n "$RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN" ] && [ "$RUNTIME_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN_INPUT" != "$RUNTIME_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN" ]; then
