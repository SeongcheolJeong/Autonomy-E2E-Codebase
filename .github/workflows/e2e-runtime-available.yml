      - name: Build runtime available CI summary
        if: ${{ always() }}
        shell: bash
        env:
          CI_SUMMARY_PROFILE: runtime_available
          ARTIFACTS_ROOT: .
          SUMMARY_FILES_ROOT: .
          SUMMARY_FILES_SUBPATH: 30_Projects/P_Validation-Tooling-MVP/prototype/reports
          PIPELINE_MANIFESTS_ROOT: .
          PIPELINE_MANIFESTS_SUBPATH: 30_Projects/P_Cloud-Engine/prototype/batch_runs
          RELEASE_PREFIX: ${{ steps.run_lane.outputs.release_prefix || steps.run_lane.outputs.release_id }}
          SUMMARY_TITLE: Runtime Available CI Summary
          WORKFLOW_NAME: E2E Runtime Available Lane
          SUMMARY_OUT_TEXT: runtime_available_release_diff.txt
          SUMMARY_OUT_JSON: runtime_available_release_summary.json
          SUMMARY_OUT_DB: runtime_available_release_summary.sqlite
          NOTIFICATION_OUT_JSON: runtime_available_notification_payload.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_ON: ${{ github.event.inputs.notify_on }}
          NOTIFY_FORMAT: ${{ github.event.inputs.notify_format }}
          WEBHOOK_URL: ${{ secrets.E2E_NOTIFICATION_WEBHOOK_URL }}
          NOTIFY_TIMEOUT_SEC: ${{ github.event.inputs.notify_timeout_sec }}
          NOTIFY_MAX_RETRIES: ${{ github.event.inputs.notify_max_retries }}
          NOTIFY_RETRY_BACKOFF_SEC: ${{ github.event.inputs.notify_retry_backoff_sec }}
          NOTIFY_RUNTIME_LANE_EXECUTION_WARN_MIN_EXEC_ROWS: ${{ steps.run_lane.outputs.runtime_exec_lane_warn_min_rows || '0' }}
          NOTIFY_RUNTIME_LANE_EXECUTION_HOLD_MIN_EXEC_ROWS: ${{ steps.run_lane.outputs.runtime_exec_lane_hold_min_rows || '0' }}
          NOTIFY_RUNTIME_EVIDENCE_COMPARE_WARN_MIN_ARTIFACTS_WITH_DIFFS: ${{ steps.run_lane.outputs.runtime_evidence_compare_warn_min_artifacts_with_diffs || '0' }}
          NOTIFY_RUNTIME_EVIDENCE_COMPARE_HOLD_MIN_ARTIFACTS_WITH_DIFFS: ${{ steps.run_lane.outputs.runtime_evidence_compare_hold_min_artifacts_with_diffs || '0' }}
          NOTIFY_RUNTIME_EVIDENCE_COMPARE_WARN_MIN_INTEROP_IMPORT_MODE_DIFF_COUNT: ${{ steps.run_lane.outputs.runtime_evidence_compare_warn_min_interop_import_mode_diff_count || '0' }}
          NOTIFY_RUNTIME_EVIDENCE_COMPARE_HOLD_MIN_INTEROP_IMPORT_MODE_DIFF_COUNT: ${{ steps.run_lane.outputs.runtime_evidence_compare_hold_min_interop_import_mode_diff_count || '0' }}
          NOTIFY_PHASE2_SENSOR_FIDELITY_SCORE_AVG_WARN_MIN: ${{ steps.run_lane.outputs.phase2_sensor_fidelity_score_avg_warn_min || '0' }}
          NOTIFY_PHASE2_SENSOR_FIDELITY_SCORE_AVG_HOLD_MIN: ${{ steps.run_lane.outputs.phase2_sensor_fidelity_score_avg_hold_min || '0' }}
          NOTIFY_PHASE2_SENSOR_FRAME_COUNT_AVG_WARN_MIN: ${{ steps.run_lane.outputs.phase2_sensor_frame_count_avg_warn_min || '0' }}
          NOTIFY_PHASE2_SENSOR_FRAME_COUNT_AVG_HOLD_MIN: ${{ steps.run_lane.outputs.phase2_sensor_frame_count_avg_hold_min || '0' }}
          NOTIFY_PHASE2_SENSOR_CAMERA_NOISE_STDDEV_PX_AVG_WARN_MAX: ${{ steps.run_lane.outputs.phase2_sensor_camera_noise_stddev_px_avg_warn_max || '0' }}
          NOTIFY_PHASE2_SENSOR_CAMERA_NOISE_STDDEV_PX_AVG_HOLD_MAX: ${{ steps.run_lane.outputs.phase2_sensor_camera_noise_stddev_px_avg_hold_max || '0' }}
          NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN: ${{ steps.run_lane.outputs.phase2_sensor_lidar_point_count_avg_warn_min || '0' }}
          NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN: ${{ steps.run_lane.outputs.phase2_sensor_lidar_point_count_avg_hold_min || '0' }}
          NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_WARN_MAX: ${{ steps.run_lane.outputs.phase2_sensor_radar_false_positive_rate_avg_warn_max || '0' }}
          NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX: ${{ steps.run_lane.outputs.phase2_sensor_radar_false_positive_rate_avg_hold_max || '0' }}
