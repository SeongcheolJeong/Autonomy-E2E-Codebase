              "phase2_sensor_radar_false_positive_rate_avg_warn_max_input_effective_mismatch"
          fi
          if [ -n "$RUNTIME_NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX_INPUT" ] && [ -n "$RUNTIME_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX" ] && [ "$RUNTIME_NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX_INPUT" != "$RUNTIME_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX" ]; then
