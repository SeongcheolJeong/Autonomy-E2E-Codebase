name: E2E Runtime Available Lane

on:
  workflow_dispatch:
    inputs:
      sim_runtime:
        description: "Runtime target: awsim|carla|both"
        required: false
        type: choice
        options:
          - awsim
          - carla
          - both
        default: awsim
      lane:
        description: "Lane selector: auto|exec|contract"
        required: false
        type: choice
        options:
          - auto
          - exec
          - contract
        default: auto
      release_id:
        description: "Release ID override (optional)"
        required: false
        default: ""
      matrix_profile_ids:
        description: "Comma-separated runtime matrix profile ids"
        required: false
        default: "runtime_carla_smoke_v0,runtime_awsim_smoke_v0"
      runtime_asset_profile:
        description: "Runtime asset profile: lightweight|full"
        required: false
        type: choice
        options:
          - lightweight
          - full
        default: lightweight
      runtime_asset_archive_sha256_mode:
        description: "Runtime asset archive sha256 mode: always|verify_only|never"
        required: false
        type: choice
        options:
          - verify_only
          - always
          - never
        default: verify_only
      install_runtime_deps:
        description: "Install Linux runtime dependencies for AWSIM/CARLA execution (1/0)"
        required: false
        default: "1"
      use_runtime_asset_cache:
        description: "Enable runtime asset archive cache across workflow runs (1/0)"
        required: false
        default: "1"
      dry_run:
        description: "Run dry-run target only (1/0)"
        required: false
        default: "0"
      runtime_native_docker_auto_enable:
        description: "Run runtime-native docker auto smoke job (1/0)"
        required: false
        default: "1"
      runtime_native_docker_auto_dry_run:
        description: "Run runtime-native docker auto smoke in dry-run mode (1/0)"
        required: false
        default: "0"
      runtime_native_sim_runtime:
        description: "Runtime target for runtime-native docker auto smoke: awsim|carla|both"
        required: false
        type: choice
        options:
          - awsim
          - carla
          - both
        default: carla
      runtime_native_summary_compare_fail_on_missing:
        description: "Fail runtime-native docker auto job when both-runtime summary-compare output is missing/invalid (1/0)"
        required: false
        default: "0"
      runtime_native_summary_compare_fail_on_diffs:
        description: "Fail runtime-native docker auto job when both-runtime summary-compare reports diffs > 0 (1/0)"
        required: false
        default: "0"
      continue_on_runtime_failure:
        description: "When sim_runtime=both, continue remaining runtimes after one runtime failure (1/0)"
        required: false
        default: "1"
      asset_skip_download:
        description: "Skip download when archive cache exists (1/0)"
        required: false
        default: "1"
      asset_skip_extract:
        description: "Skip extraction step (1/0)"
        required: false
        default: "0"
      asset_force_download:
        description: "Force archive re-download (1/0)"
        required: false
        default: "0"
      asset_force_extract:
        description: "Force extraction refresh (1/0)"
        required: false
        default: "0"
      runtime_scenario_contract_enable:
        description: "Enable runtime scenario contract block (1/0)"
        required: false
        default: "1"
      runtime_scenario_contract_require_runtime_ready:
        description: "Require runtime-ready for scenario contract block (1/0)"
        required: false
        default: "1"
      runtime_scene_result_enable:
        description: "Enable runtime scene result block (1/0)"
        required: false
        default: "1"
      runtime_scene_result_require_runtime_ready:
        description: "Require runtime-ready for scene result block (1/0)"
        required: false
        default: "1"
      runtime_interop_contract_enable:
        description: "Enable runtime interop contract block (1/0)"
        required: false
        default: "1"
      runtime_interop_contract_require_runtime_ready:
        description: "Require runtime-ready for interop contract block (1/0)"
        required: false
        default: "1"
      runtime_interop_export_road_length_scale:
        description: "Optional runtime interop export road-length scale (>0 float, empty => default)"
        required: false
        default: ""
      runtime_interop_contract_xosc:
        description: "Optional runtime interop contract OpenSCENARIO (.xosc) input path (empty => default sample)"
        required: false
        default: ""
      runtime_interop_contract_xodr:
        description: "Optional runtime interop contract OpenDRIVE (.xodr) input path (empty => default sample)"
        required: false
        default: ""
      runtime_interop_import_manifest_consistency_mode:
        description: "Runtime interop import manifest consistency mode: require|allow"
        required: false
        type: choice
        options:
          - require
          - allow
        default: allow
      runtime_interop_import_export_consistency_mode:
        description: "Runtime interop import/export consistency mode: require|allow"
        required: false
        type: choice
        options:
          - require
          - allow
        default: allow
      notify_on:
        description: "Notification policy: always/hold/warn/hold_warn/pass/never"
        required: false
        default: "hold_warn"
      notify_format:
        description: "Notification format: slack/raw"
        required: false
        default: "slack"
      notify_timeout_sec:
        description: "Notification webhook timeout seconds (>0)"
        required: false
        default: "10"
      notify_max_retries:
        description: "Notification retry count (>=0)"
        required: false
        default: "2"
      notify_retry_backoff_sec:
        description: "Notification retry backoff seconds (>=0)"
        required: false
        default: "2"
      notify_runtime_lane_execution_warn_min_exec_rows:
        description: "Optional runtime exec-lane WARN threshold override (non-negative integer, empty => lane default)"
        required: false
        default: ""
      notify_runtime_lane_execution_hold_min_exec_rows:
        description: "Optional runtime exec-lane HOLD threshold override (non-negative integer, empty => lane default)"
        required: false
        default: ""
      notify_runtime_evidence_compare_warn_min_artifacts_with_diffs:
        description: "Optional runtime evidence compare WARN threshold override for artifacts_with_diffs_count (non-negative integer, empty => profile default)"
        required: false
        default: ""
      notify_runtime_evidence_compare_hold_min_artifacts_with_diffs:
        description: "Optional runtime evidence compare HOLD threshold override for artifacts_with_diffs_count (non-negative integer, empty => profile default)"
        required: false
        default: ""
      notify_runtime_evidence_compare_warn_min_interop_import_mode_diff_count:
        description: "Optional runtime evidence compare WARN threshold override for interop import mode diff total (non-negative integer, empty => profile default)"
        required: false
        default: ""
      notify_runtime_evidence_compare_hold_min_interop_import_mode_diff_count:
        description: "Optional runtime evidence compare HOLD threshold override for interop import mode diff total (non-negative integer, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_fidelity_score_avg_warn_min:
        description: "Optional phase2 sensor fidelity average score WARN threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_fidelity_score_avg_hold_min:
        description: "Optional phase2 sensor fidelity average score HOLD threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_frame_count_avg_warn_min:
        description: "Optional phase2 sensor frame-count average WARN threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_frame_count_avg_hold_min:
        description: "Optional phase2 sensor frame-count average HOLD threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_camera_noise_stddev_px_avg_warn_max:
        description: "Optional phase2 sensor camera-noise stddev px average WARN threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_camera_noise_stddev_px_avg_hold_max:
        description: "Optional phase2 sensor camera-noise stddev px average HOLD threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_lidar_point_count_avg_warn_min:
        description: "Optional phase2 sensor lidar point-count average WARN threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_lidar_point_count_avg_hold_min:
        description: "Optional phase2 sensor lidar point-count average HOLD threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_radar_false_positive_rate_avg_warn_max:
        description: "Optional phase2 sensor radar false-positive-rate average WARN threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      notify_phase2_sensor_radar_false_positive_rate_avg_hold_max:
        description: "Optional phase2 sensor radar false-positive-rate average HOLD threshold override (non-negative float, empty => profile default)"
        required: false
        default: ""
      runtime_threshold_drift_fail_on_hold:
        description: "Fail workflow when runtime threshold drift severity resolves to HOLD (1/0)"
        required: false
        default: "0"
      phase2_log_replay_threshold_fail_on_hold:
        description: "Fail summary stage when phase2 log replay threshold severity resolves to HOLD (1/0)"
        required: false
        default: "1"
      runtime_native_smoke_threshold_fail_on_hold:
        description: "Fail summary stage when runtime native smoke threshold severity resolves to HOLD (1/0)"
        required: false
        default: "1"
      runtime_native_evidence_compare_threshold_fail_on_hold:
        description: "Fail summary stage when runtime native evidence compare threshold severity resolves to HOLD (1/0)"
        required: false
        default: "1"
      notify_phase3_vehicle_control_overlap_ratio_warn_max:
        description: "Optional phase3 vehicle control overlap ratio WARN threshold override (0~1, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_control_overlap_ratio_hold_max:
        description: "Optional phase3 vehicle control overlap ratio HOLD threshold override (0~1, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_control_steering_rate_warn_max:
        description: "Optional phase3 vehicle control max steering-rate WARN threshold override in deg/s (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_control_steering_rate_hold_max:
        description: "Optional phase3 vehicle control max steering-rate HOLD threshold override in deg/s (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_control_throttle_plus_brake_warn_max:
        description: "Optional phase3 vehicle control max throttle+brake WARN threshold override (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_control_throttle_plus_brake_hold_max:
        description: "Optional phase3 vehicle control max throttle+brake HOLD threshold override (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_speed_tracking_error_warn_max:
        description: "Optional phase3 vehicle max speed-tracking error WARN threshold override in m/s (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_speed_tracking_error_hold_max:
        description: "Optional phase3 vehicle max speed-tracking error HOLD threshold override in m/s (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_speed_tracking_error_abs_warn_max:
        description: "Optional phase3 vehicle max absolute speed-tracking error WARN threshold override in m/s (non-negative, empty => disabled)"
        required: false
        default: ""
      notify_phase3_vehicle_speed_tracking_error_abs_hold_max:
        description: "Optional phase3 vehicle max absolute speed-tracking error HOLD threshold override in m/s (non-negative, empty => disabled)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: e2e-runtime-available-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-available:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      release_id: ${{ steps.run_lane.outputs.release_id }}
      release_prefix: ${{ steps.run_lane.outputs.release_prefix }}
      release_ids_csv: ${{ steps.run_lane.outputs.release_ids_csv }}
      runtime_results_csv: ${{ steps.run_lane.outputs.runtime_results_csv }}
      failed_runtimes_csv: ${{ steps.run_lane.outputs.failed_runtimes_csv }}
      runtime_evidence_missing_runtimes_csv: ${{ steps.run_lane.outputs.runtime_evidence_missing_runtimes_csv }}
      runtime_execution_summary_path: ${{ steps.run_lane.outputs.runtime_execution_summary_path }}
      runtime_execution_evidence_summary: ${{ steps.run_lane.outputs.runtime_execution_evidence_summary }}
      runtime_execution_evidence_missing_runtime_counts: ${{ steps.run_lane.outputs.runtime_execution_evidence_missing_runtime_counts }}
      runtime_evidence_compare_json_path: ${{ steps.run_lane.outputs.runtime_evidence_compare_json_path }}
      runtime_evidence_compare_text_path: ${{ steps.run_lane.outputs.runtime_evidence_compare_text_path }}
      runtime_evidence_compare_summary: ${{ steps.run_lane.outputs.runtime_evidence_compare_summary }}
      runtime_exec_lane_warn_min_rows: ${{ steps.run_lane.outputs.runtime_exec_lane_warn_min_rows }}
      runtime_exec_lane_hold_min_rows: ${{ steps.run_lane.outputs.runtime_exec_lane_hold_min_rows }}
      runtime_evidence_compare_warn_min_artifacts_with_diffs: ${{ steps.run_lane.outputs.runtime_evidence_compare_warn_min_artifacts_with_diffs }}
      runtime_evidence_compare_hold_min_artifacts_with_diffs: ${{ steps.run_lane.outputs.runtime_evidence_compare_hold_min_artifacts_with_diffs }}
      runtime_evidence_compare_warn_min_interop_import_mode_diff_count: ${{ steps.run_lane.outputs.runtime_evidence_compare_warn_min_interop_import_mode_diff_count }}
      runtime_evidence_compare_hold_min_interop_import_mode_diff_count: ${{ steps.run_lane.outputs.runtime_evidence_compare_hold_min_interop_import_mode_diff_count }}
      phase2_sensor_fidelity_score_avg_warn_min: ${{ steps.run_lane.outputs.phase2_sensor_fidelity_score_avg_warn_min }}
      phase2_sensor_fidelity_score_avg_hold_min: ${{ steps.run_lane.outputs.phase2_sensor_fidelity_score_avg_hold_min }}
      phase2_sensor_frame_count_avg_warn_min: ${{ steps.run_lane.outputs.phase2_sensor_frame_count_avg_warn_min }}
      phase2_sensor_frame_count_avg_hold_min: ${{ steps.run_lane.outputs.phase2_sensor_frame_count_avg_hold_min }}
      phase2_sensor_camera_noise_stddev_px_avg_warn_max: ${{ steps.run_lane.outputs.phase2_sensor_camera_noise_stddev_px_avg_warn_max }}
      phase2_sensor_camera_noise_stddev_px_avg_hold_max: ${{ steps.run_lane.outputs.phase2_sensor_camera_noise_stddev_px_avg_hold_max }}
      phase2_sensor_lidar_point_count_avg_warn_min: ${{ steps.run_lane.outputs.phase2_sensor_lidar_point_count_avg_warn_min }}
      phase2_sensor_lidar_point_count_avg_hold_min: ${{ steps.run_lane.outputs.phase2_sensor_lidar_point_count_avg_hold_min }}
      phase2_sensor_radar_false_positive_rate_avg_warn_max: ${{ steps.run_lane.outputs.phase2_sensor_radar_false_positive_rate_avg_warn_max }}
      phase2_sensor_radar_false_positive_rate_avg_hold_max: ${{ steps.run_lane.outputs.phase2_sensor_radar_false_positive_rate_avg_hold_max }}
      runtime_interop_export_road_length_scale: ${{ steps.run_lane.outputs.runtime_interop_export_road_length_scale }}
      runtime_interop_contract_xosc: ${{ steps.run_lane.outputs.runtime_interop_contract_xosc }}
      runtime_interop_contract_xodr: ${{ steps.run_lane.outputs.runtime_interop_contract_xodr }}
      runtime_interop_import_manifest_consistency_mode: ${{ steps.run_lane.outputs.runtime_interop_import_manifest_consistency_mode }}
      runtime_interop_import_export_consistency_mode: ${{ steps.run_lane.outputs.runtime_interop_import_export_consistency_mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore runtime asset archive cache
        id: runtime_asset_cache
        if: ${{ github.event.inputs.use_runtime_asset_cache == '1' }}
        uses: actions/cache@v4
        with:
          path: |
            30_Projects/P_Sim-Engine/prototype/runtime_assets/_archives
          key: runtime-asset-archives-${{ runner.os }}-${{ runner.arch }}-${{ github.event.inputs.sim_runtime }}-${{ github.event.inputs.runtime_asset_profile }}-${{ hashFiles('30_Projects/P_Sim-Engine/prototype/examples/runtime_assets_manifest_v0.json') }}
          restore-keys: |
            runtime-asset-archives-${{ runner.os }}-${{ runner.arch }}-${{ github.event.inputs.sim_runtime }}-${{ github.event.inputs.runtime_asset_profile }}-
            runtime-asset-archives-${{ runner.os }}-${{ runner.arch }}-${{ github.event.inputs.sim_runtime }}-
            runtime-asset-archives-${{ runner.os }}-${{ runner.arch }}-

      - name: Install runtime execution dependencies
        if: ${{ github.event.inputs.install_runtime_deps == '1' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2 \
            libglib2.0-0 \
            libglu1-mesa \
            libgtk-3-0 \
            libnss3 \
            libsdl2-2.0-0 \
            libvulkan1 \
            libxcursor1 \
            libxi6 \
            libxinerama1 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            xvfb

      - name: Run runtime-available lane
        id: run_lane
        shell: bash
        env:
          INPUT_RELEASE_ID: ${{ github.event.inputs.release_id }}
          INPUT_SIM_RUNTIME: ${{ github.event.inputs.sim_runtime }}
          INPUT_LANE: ${{ github.event.inputs.lane }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_CONTINUE_ON_RUNTIME_FAILURE: ${{ github.event.inputs.continue_on_runtime_failure }}
          INPUT_MATRIX_PROFILE_IDS: ${{ github.event.inputs.matrix_profile_ids }}
          INPUT_RUNTIME_ASSET_PROFILE: ${{ github.event.inputs.runtime_asset_profile }}
          INPUT_RUNTIME_ASSET_ARCHIVE_SHA256_MODE: ${{ github.event.inputs.runtime_asset_archive_sha256_mode }}
          INPUT_ASSET_SKIP_DOWNLOAD: ${{ github.event.inputs.asset_skip_download }}
          INPUT_ASSET_SKIP_EXTRACT: ${{ github.event.inputs.asset_skip_extract }}
          INPUT_ASSET_FORCE_DOWNLOAD: ${{ github.event.inputs.asset_force_download }}
          INPUT_ASSET_FORCE_EXTRACT: ${{ github.event.inputs.asset_force_extract }}
          INPUT_RUNTIME_SCENARIO_CONTRACT_ENABLE: ${{ github.event.inputs.runtime_scenario_contract_enable }}
          INPUT_RUNTIME_SCENARIO_CONTRACT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_scenario_contract_require_runtime_ready }}
          INPUT_RUNTIME_SCENE_RESULT_ENABLE: ${{ github.event.inputs.runtime_scene_result_enable }}
          INPUT_RUNTIME_SCENE_RESULT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_scene_result_require_runtime_ready }}
          INPUT_RUNTIME_INTEROP_CONTRACT_ENABLE: ${{ github.event.inputs.runtime_interop_contract_enable }}
          INPUT_RUNTIME_INTEROP_CONTRACT_REQUIRE_RUNTIME_READY: ${{ github.event.inputs.runtime_interop_contract_require_runtime_ready }}
          INPUT_RUNTIME_INTEROP_EXPORT_ROAD_LENGTH_SCALE: ${{ github.event.inputs.runtime_interop_export_road_length_scale }}
          INPUT_RUNTIME_INTEROP_CONTRACT_XOSC: ${{ github.event.inputs.runtime_interop_contract_xosc }}
          INPUT_RUNTIME_INTEROP_CONTRACT_XODR: ${{ github.event.inputs.runtime_interop_contract_xodr }}
          INPUT_RUNTIME_INTEROP_IMPORT_MANIFEST_CONSISTENCY_MODE: ${{ github.event.inputs.runtime_interop_import_manifest_consistency_mode }}
          INPUT_RUNTIME_INTEROP_IMPORT_EXPORT_CONSISTENCY_MODE: ${{ github.event.inputs.runtime_interop_import_export_consistency_mode }}
          INPUT_NOTIFY_RUNTIME_LANE_EXECUTION_WARN_MIN_EXEC_ROWS: ${{ github.event.inputs.notify_runtime_lane_execution_warn_min_exec_rows }}
          INPUT_NOTIFY_RUNTIME_LANE_EXECUTION_HOLD_MIN_EXEC_ROWS: ${{ github.event.inputs.notify_runtime_lane_execution_hold_min_exec_rows }}
          INPUT_NOTIFY_RUNTIME_EVIDENCE_COMPARE_WARN_MIN_ARTIFACTS_WITH_DIFFS: ${{ github.event.inputs.notify_runtime_evidence_compare_warn_min_artifacts_with_diffs }}
          INPUT_NOTIFY_RUNTIME_EVIDENCE_COMPARE_HOLD_MIN_ARTIFACTS_WITH_DIFFS: ${{ github.event.inputs.notify_runtime_evidence_compare_hold_min_artifacts_with_diffs }}
          INPUT_NOTIFY_RUNTIME_EVIDENCE_COMPARE_WARN_MIN_INTEROP_IMPORT_MODE_DIFF_COUNT: ${{ github.event.inputs.notify_runtime_evidence_compare_warn_min_interop_import_mode_diff_count }}
          INPUT_NOTIFY_RUNTIME_EVIDENCE_COMPARE_HOLD_MIN_INTEROP_IMPORT_MODE_DIFF_COUNT: ${{ github.event.inputs.notify_runtime_evidence_compare_hold_min_interop_import_mode_diff_count }}
          INPUT_NOTIFY_PHASE2_SENSOR_FIDELITY_SCORE_AVG_WARN_MIN: ${{ github.event.inputs.notify_phase2_sensor_fidelity_score_avg_warn_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_FIDELITY_SCORE_AVG_HOLD_MIN: ${{ github.event.inputs.notify_phase2_sensor_fidelity_score_avg_hold_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_FRAME_COUNT_AVG_WARN_MIN: ${{ github.event.inputs.notify_phase2_sensor_frame_count_avg_warn_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_FRAME_COUNT_AVG_HOLD_MIN: ${{ github.event.inputs.notify_phase2_sensor_frame_count_avg_hold_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_CAMERA_NOISE_STDDEV_PX_AVG_WARN_MAX: ${{ github.event.inputs.notify_phase2_sensor_camera_noise_stddev_px_avg_warn_max }}
          INPUT_NOTIFY_PHASE2_SENSOR_CAMERA_NOISE_STDDEV_PX_AVG_HOLD_MAX: ${{ github.event.inputs.notify_phase2_sensor_camera_noise_stddev_px_avg_hold_max }}
          INPUT_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_WARN_MIN: ${{ github.event.inputs.notify_phase2_sensor_lidar_point_count_avg_warn_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_LIDAR_POINT_COUNT_AVG_HOLD_MIN: ${{ github.event.inputs.notify_phase2_sensor_lidar_point_count_avg_hold_min }}
          INPUT_NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_WARN_MAX: ${{ github.event.inputs.notify_phase2_sensor_radar_false_positive_rate_avg_warn_max }}
          INPUT_NOTIFY_PHASE2_SENSOR_RADAR_FALSE_POSITIVE_RATE_AVG_HOLD_MAX: ${{ github.event.inputs.notify_phase2_sensor_radar_false_positive_rate_avg_hold_max }}
          FALLBACK_RUN_ID: ${{ github.run_id }}
          FALLBACK_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          validate_binary_flag() {
            local value="$1"
            local name="$2"
            case "$value" in
              0|1) ;;
              *)
                echo "[error] ${name} must be 0 or 1, got: ${value}" >&2
                exit 2
                ;;
            esac
          }

          validate_choice() {
            local value="$1"
            local name="$2"
            shift 2
            local allowed=""
            local candidate
            for candidate in "$@"; do
              if [ "$value" = "$candidate" ]; then
                return 0
              fi
              if [ -n "$allowed" ]; then
                allowed="${allowed},${candidate}"
              else
                allowed="${candidate}"
              fi
            done
            echo "[error] ${name} must be one of: ${allowed}; got: ${value}" >&2
            exit 2
          }

          validate_non_negative_int() {
            local value="$1"
            local name="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            case "$value" in
              ''|*[!0-9]*)
                echo "[error] ${name} must be a non-negative integer, got: ${value}" >&2
                exit 2
                ;;
              *)
                ;;
            esac
          }

          validate_non_negative_float() {
            local value="$1"
            local name="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            if ! python3 - "$value" <<'PY'
          import math
          import sys

          try:
              parsed = float(str(sys.argv[1]).strip())
          except (TypeError, ValueError):
              sys.exit(1)
          if not math.isfinite(parsed) or parsed < 0:
              sys.exit(1)
          PY
            then
              echo "[error] ${name} must be a non-negative float, got: ${value}" >&2
              exit 2
            fi
          }

          validate_positive_float() {
            local value="$1"
            local name="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            if ! python3 - "$value" <<'PY'
          import math
          import sys

          try:
              parsed = float(str(sys.argv[1]).strip())
          except (TypeError, ValueError):
              sys.exit(1)
          if not math.isfinite(parsed) or parsed <= 0:
              sys.exit(1)
          PY
            then
              echo "[error] ${name} must be a positive float, got: ${value}" >&2
              exit 2
            fi
          }

          validate_hold_not_greater_than_warn() {
            local warn_value="$1"
            local hold_value="$2"
            local metric_name="$3"
            if ! python3 - "$warn_value" "$hold_value" <<'PY'
          import math
          import sys

          try:
              warn_value = float(sys.argv[1])
              hold_value = float(sys.argv[2])
