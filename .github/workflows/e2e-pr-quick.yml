          if-no-files-found: warn
          path: |
            e2e_pipeline.log
            30_Projects/P_Cloud-Engine/prototype/batch_runs
            30_Projects/P_Data-Lake-and-Explorer/prototype/data
            30_Projects/P_Validation-Tooling-MVP/prototype/reports

  summarize-quick:
    needs: [precheck, run-e2e-quick]
    if: ${{ always() && needs.precheck.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

