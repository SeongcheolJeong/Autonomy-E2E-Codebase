name: E2E PR Quick Pipeline

on:
  pull_request:
    paths:
      # BEGIN AUTO-GENERATED PR QUICK PATHS
      - '.github/workflows/e2e-*.yml'
      - '30_Projects/P_E2E_Stack/prototype/**'
      - '30_Projects/P_Cloud-Engine/prototype/**'
      - '30_Projects/P_Sim-Engine/prototype/**'
      - '30_Projects/P_Data-Lake-and-Explorer/prototype/**'
      - '30_Projects/P_Validation-Tooling-MVP/prototype/**'
      # END AUTO-GENERATED PR QUICK PATHS
  workflow_dispatch:
    inputs:
      batch_spec:
        description: "Path to quick batch spec JSON/YAML"
        required: false
        default: ""
      quick_profile_file:
        description: "Path to quick profile JSON (optional)"
        required: false
        default: ""
      quick_profile_id:
        description: "profile_id to select when batch_spec is empty (optional)"
        required: false
        default: ""
      notify_on:
        description: "Notification policy: always/hold/warn/hold_warn/pass/never"
        required: false
        default: "hold_warn"
      notify_format:
        description: "Notification format: slack/raw"
        required: false
        default: "slack"
      notify_timeout_sec:
        description: "Notification webhook timeout seconds (>0)"
        required: false
        default: "10"
      notify_max_retries:
        description: "Notification retry count (>=0)"
        required: false
        default: "2"
      notify_retry_backoff_sec:
        description: "Notification retry backoff seconds (>=0)"
        required: false
        default: "2"
      notify_timing_total_warn_ms:
        description: "Promote PASS/INFO to WARN when summary timing total exceeds threshold ms (0 disables)"
        required: false
        default: "120000"
      notify_timing_regression_baseline_ms:
        description: "Timing regression baseline in ms for summary timing total (0 disables)"
        required: false
        default: "0"
      notify_timing_regression_warn_ratio:
        description: "Promote PASS/INFO to WARN when (current-baseline)/baseline ratio exceeds this value (0 disables)"
        required: false
        default: "0"
      notify_timing_regression_history_window:
