permissions:
  contents: read

concurrency:
  group: e2e-pr-quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
      matched_file: ${{ steps.decide.outputs.matched_file }}
      matched_pattern: ${{ steps.decide.outputs.matched_pattern }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide if quick pipeline should run
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          bash 30_Projects/P_E2E_Stack/prototype/run_ci_precheck_entry.sh

      - name: Publish precheck summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          python3 30_Projects/P_E2E_Stack/prototype/write_ci_summary_section.py \
            --title "PR Quick Precheck" \
            --item "should_run=${{ steps.decide.outputs.should_run }}" \
            --item "reason=${{ steps.decide.outputs.reason }}" \
            --item "matched_file=${{ steps.decide.outputs.matched_file }}" \
            --item "matched_pattern=${{ steps.decide.outputs.matched_pattern }}"

  run-e2e-quick:
    needs: precheck
    if: ${{ needs.precheck.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      release_id: ${{ steps.run_pipeline.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CI preflight checks
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          bash 30_Projects/P_E2E_Stack/prototype/run_ci_preflight_entry.sh

      - name: Publish preflight stage summary
        if: ${{ always() }}
        shell: bash
        env:
          PREFLIGHT_SUMMARY_TITLE: "PR Quick Preflight Stages"
          PHASE1_OUTCOME: ${{ steps.preflight.outputs.phase1_outcome }}
          PHASE4_OUTCOME: ${{ steps.preflight.outputs.phase4_outcome }}
