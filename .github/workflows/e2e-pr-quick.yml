        required: false
        default: "0"
      notify_timing_regression_history_dir:
        description: "Optional directory for timing regression history scan (empty uses summary output directory)"
        required: false
        default: ""
      notify_timing_regression_history_outlier_method:
        description: "History outlier filter for regression baseline: none/iqr"
        required: false
        default: "none"
      notify_timing_regression_history_trim_ratio:
        description: "History symmetric trim ratio for regression baseline [0, 0.5)"
        required: false
        default: "0"
      notify_phase4_primary_warn_ratio:
        description: "Promote PASS/INFO to WARN when phase4 primary total coverage is below this ratio (0 disables)"
        required: false
        default: "0"
      notify_phase4_primary_hold_ratio:
        description: "Promote status to HOLD when phase4 primary total coverage is below this ratio (0 disables)"
        required: false
        default: "0"
      notify_phase4_primary_module_warn_thresholds:
